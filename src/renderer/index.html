<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' file: 'unsafe-eval'; connect-src 'self' blob: file:; worker-src 'self' blob:; media-src 'self' blob:; img-src 'self' data: blob:">
  <title>ProximityLock</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <div class="app-header">
    <span class="app-title">ProximityLock</span> <span class="app-version">v1.0.0</span>
    <button class="settings-gear" id="settings-gear-btn" title="Settings">⚙</button>
  </div>

  <div class="app-layout">

    <!-- LEFT: Preview -->
    <div class="col-preview">
      <div class="card cam-preview-card">
        <div class="cam-preview-wrap" id="cam-preview-wrap">
          <video id="camera-preview-video" autoplay muted playsinline></video>
          <div class="cam-preview-off" id="cam-preview-off">
            <span class="cam-off-icon">📷</span>
            <span class="cam-off-text">Select a camera to start</span>
          </div>
        </div>
      </div>
      <div class="cam-preview-footer">
        <select id="camera-select" class="cam-select">
          <option value="">Select a camera…</option>
        </select>
        <button class="btn btn-sm btn-secondary" id="preview-toggle-btn">👁 Preview Off</button>
      </div>
      <div class="cam-status-bar">
        <span class="detection-status-text" id="detection-status-text">Idle</span>
        <span class="detection-timer" id="detection-timer"></span>
      </div>
    </div>

    <!-- RIGHT: Controls -->
    <div class="col-controls">

      <!-- Enrollment -->
      <div class="card cam-enroll-card">
        <div id="enrolled-photo-container" class="cam-enroll-row" style="display:none">
          <img id="enrolled-photo" class="cam-enroll-thumb">
          <div class="cam-enroll-info">
            <span id="enrolled-name">✅ Face enrolled</span>
            <button class="btn btn-xs btn-danger" id="re-enroll-btn">🔄 Retake</button>
          </div>
        </div>
        <div id="enroll-prompt" class="cam-enroll-prompt">
          <span>📸</span>
          <span>Take a photo to enroll your face</span>
          <button class="btn btn-xs btn-primary" id="enroll-btn">Take Photo</button>
        </div>
      </div>

      <!-- Thresholds -->
      <div class="card cam-threshold-card">
        <div class="threshold-row">
          <div class="threshold-label">
            <label>Match threshold</label>
            <span class="threshold-desc">Min similarity to count as you</span>
          </div>
          <div class="threshold-control">
            <input type="range" id="match-threshold" min="20" max="80" step="5" value="35">
            <span class="slider-val" id="match-threshold-val">35%</span>
          </div>
        </div>
        <div class="threshold-row">
          <div class="threshold-label">
            <label>Lock delay</label>
            <span class="threshold-desc">Seconds without face before lock</span>
          </div>
          <div class="threshold-control">
            <input type="range" id="camera-lock-delay" min="3" max="30" step="1">
            <span class="slider-val" id="camera-lock-delay-val">— s</span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="cam-actions">
        <button class="btn btn-success" id="monitoring-toggle-btn">▶ Start Monitoring</button>
        <button class="btn btn-danger" id="lock-now-btn">🔒 Lock Now</button>
      </div>

    </div>

  </div>

  <!-- Settings overlay -->
  <div class="settings-overlay hidden" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-panel-header">
        <span>⚙ Settings</span>
        <button class="settings-close" id="settings-close-btn">✕</button>
      </div>
      <div class="settings-panel-body">
        <h4>Detection</h4>
        <div class="slider-row">
          <div class="slider-header">
            <label for="camera-check-interval">Check every</label>
            <span class="slider-val" id="camera-check-interval-val">— s</span>
          </div>
          <input type="range" id="camera-check-interval" min="0.5" max="3" step="0.5">
          <div class="slider-labels"><span>0.5 s</span><span>1.5 s</span><span>3 s</span></div>
        </div>
        <h4 style="margin-top:16px">App</h4>
        <div class="pref-row"><div class="pref-label-group"><span class="pref-label">Start on Login</span></div><label class="toggle-switch"><input type="checkbox" id="start-on-login"><span class="toggle-knob"></span></label></div>
        <div class="pref-row"><div class="pref-label-group"><span class="pref-label">Menu Bar Only</span></div><label class="toggle-switch"><input type="checkbox" id="menu-bar-only"><span class="toggle-knob"></span></label></div>
        <div class="pref-row"><div class="pref-label-group"><span class="pref-label">Notifications</span></div><label class="toggle-switch"><input type="checkbox" id="notifications"><span class="toggle-knob"></span></label></div>
      </div>
      <div class="settings-panel-footer">
        <button class="btn btn-primary btn-sm" id="settings-save-btn">Save & Close</button>
      </div>
    </div>
  </div>

  <script src="scripts/face-detector.js"></script>
  <script src="scripts/preferences.js"></script>
</body>
</html>
