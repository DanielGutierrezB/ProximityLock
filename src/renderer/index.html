<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>ProximityLock</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">ProximityLock</span>
  </div>

  <div class="content">

    <div class="settings-section">
      <div class="section-header">Bluetooth Device</div>
      <div class="card">
        <div id="device-list-el"></div>
        <div class="device-actions">
          <span class="status-text" id="scan-status">Not scanning</span>
          <button class="btn btn-secondary" id="scan-btn">Scan</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-header">Live Signal</div>
      <div class="card">
        <div id="signal-meter-el"></div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-header">Lock Sensitivity</div>
      <div class="card card-body">
        <div class="slider-row">
          <div class="slider-header">
            <label for="rssi-threshold">RSSI Threshold</label>
            <span class="slider-val" id="rssi-val">— dBm</span>
          </div>
          <input type="range" id="rssi-threshold" min="-100" max="-40" step="1">
          <div class="slider-labels"><span>Far</span><span>Close</span><span>Very Close</span></div>
        </div>
        <div class="slider-divider"></div>
        <div class="slider-row">
          <div class="slider-header">
            <label for="lock-delay">Lock Delay</label>
            <span class="slider-val" id="delay-val">— s</span>
          </div>
          <input type="range" id="lock-delay" min="5" max="60" step="1">
          <div class="slider-labels"><span>5 s</span><span>30 s</span><span>60 s</span></div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-header">App Behavior</div>
      <div class="card">
        <div class="pref-row">
          <span class="pref-label">Start on Login</span>
          <label class="toggle-switch">
            <input type="checkbox" id="start-on-login">
            <span class="toggle-knob"></span>
          </label>
        </div>
        <div class="pref-row">
          <span class="pref-label">Menu Bar Only</span>
          <label class="toggle-switch">
            <input type="checkbox" id="menu-bar-only">
            <span class="toggle-knob"></span>
          </label>
        </div>
        <div class="pref-row">
          <span class="pref-label">Show in Dock</span>
          <label class="toggle-switch">
            <input type="checkbox" id="show-in-dock">
            <span class="toggle-knob"></span>
          </label>
        </div>
        <div class="pref-row">
          <span class="pref-label">Start Minimized</span>
          <label class="toggle-switch">
            <input type="checkbox" id="start-minimized">
            <span class="toggle-knob"></span>
          </label>
        </div>
        <div class="pref-row pref-row--last">
          <span class="pref-label">Show Lock Notifications</span>
          <label class="toggle-switch">
            <input type="checkbox" id="notifications">
            <span class="toggle-knob"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-header">About</div>
      <div class="card">
        <div class="about-row">
          <span class="about-label">Version</span>
          <span class="about-val">1.0.0</span>
        </div>
        <div class="about-row about-row--last">
          <span class="about-desc">Locks your Mac when your Bluetooth device moves out of range</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <button class="btn btn-danger" id="lock-now-btn">Lock Screen Now</button>
      <button class="btn btn-primary" id="save-btn">Save</button>
    </div>

  </div>

  <script src="scripts/signal-meter.js"></script>
  <script src="scripts/device-list.js"></script>
  <script src="scripts/preferences.js"></script>
</body>
</html>
